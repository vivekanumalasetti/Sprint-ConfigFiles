server:
  port: 8088

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/founderlink_notifications?createDatabaseIfNotExist=true
    username: root
    password: MySql@2026
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# Custom RabbitMQ Queues
rabbitmq:
  queue:
    startup: startup.queue
    investment: investment.queue
    team: team.queue

# ✅ Swagger Config (ADDED)
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: false
  show-actuator: false
