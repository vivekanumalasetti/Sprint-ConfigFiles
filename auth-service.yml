server:
  port: 8082

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/founderlink_auth?createDatabaseIfNotExist=true
    username: root
    password: MySql@2026
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

# JWT Configuration
jwt:
  secret: FounderLinkSuperSecretKey2024ForJWT_AtLeast32Characters
  expiration: 86400000

# Eureka Client
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# Zipkin & Tracing (Micrometer)
management:
  tracing:
    sampling:
      probability: 1.0   # capture all requests (dev mode)

  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

# Actuator (optional but useful)
management.endpoints.web.exposure.include: "*"
