server:
  port: 8081

spring:
  application:
    name: api-gateway

  main:
    web-application-type: reactive

  cloud:
    gateway:
      server:
        webflux:
          routes:

            # 🔐 AUTH SERVICE
            - id: auth-service
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/auth/**
              filters:
                - RewritePath=/auth/(?<path>.*), /${path}

            # 👤 USER SERVICE
            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/users/**
              filters:
                - RewritePath=/users/(?<path>.*), /${path}

            # 🚀 STARTUP SERVICE
            - id: startup-service
              uri: lb://STARTUP-SERVICE
              predicates:
                - Path=/startups/**
              filters:
                - RewritePath=/startups/(?<path>.*), /${path}

            # 💰 INVESTMENT SERVICE
            - id: investment-service
              uri: lb://INVESTMENT-SERVICE
              predicates:
                - Path=/investments/**
              filters:
                - RewritePath=/investments/(?<path>.*), /${path}

            # 👥 TEAM SERVICE
            - id: team-service
              uri: lb://TEAM-SERVICE
              predicates:
                - Path=/teams/**
              filters:
                - RewritePath=/teams/(?<path>.*), /${path}

            # 💬 MESSAGE SERVICE
            - id: message-service
              uri: lb://MESSAGE-SERVICE
              predicates:
                - Path=/messages/**
              filters:
                - RewritePath=/messages/(?<path>.*), /${path}

            # 🔔 NOTIFICATION SERVICE
            - id: notification-service
              uri: lb://NOTIFICATION-SERVICE
              predicates:
                - Path=/notifications/**
              filters:
                - RewritePath=/notifications/(?<path>.*), /${path}


# 🔥 CENTRALIZED SWAGGER CONFIG (ALL SERVICES)
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Auth Service
        url: /auth/v3/api-docs
      - name: User Service
        url: /users/v3/api-docs
      - name: Startup Service
        url: /startups/v3/api-docs
      - name: Investment Service
        url: /investments/v3/api-docs
      - name: Team Service
        url: /teams/v3/api-docs
      - name: Message Service
        url: /messages/v3/api-docs
      - name: Notification Service
        url: /notifications/v3/api-docs


# 🌐 EUREKA CONFIG
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    hostname: localhost


# ⚡ RESILIENCE4J (OPTIONAL BUT GOOD)
resilience4j:
  circuitbreaker:
    instances:
      default:
        failure-rate-threshold: 50
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 10s
        sliding-window-size: 10


# 📊 ACTUATOR + TRACING
management:
  endpoints:
    web:
      exposure:
        include: "*"

  tracing:
    sampling:
      probability: 1.0

  # Uncomment when Zipkin is working
  # zipkin:
  #   tracing:
  #     endpoint: http://localhost:9411/api/v2/spans
