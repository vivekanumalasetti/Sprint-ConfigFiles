server:
  port: 8081

spring:
  application:
    name: api-gateway

  config:
    import:
      - optional:configserver:http://localhost:8888

  main:
    web-application-type: reactive

  cloud:
    gateway:
      server:
        webflux:
          routes:

            # ================= NORMAL ROUTES =================

            - id: auth-service
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/auth/**

            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/users/**

            - id: startup-service
              uri: lb://STARTUP-SERVICE
              predicates:
                - Path=/startups/**

            - id: investment-service
              uri: lb://INVESTMENT-SERVICE
              predicates:
                - Path=/investments/**

            - id: team-service
              uri: lb://TEAM-SERVICE
              predicates:
                - Path=/teams/**

            - id: message-service
              uri: lb://MESSAGE-SERVICE
              predicates:
                - Path=/messages/**

            - id: notification-service
              uri: lb://NOTIFICATION-SERVICE
              predicates:
                - Path=/notifications/**


            # ================= SWAGGER DOC ROUTES =================

            - id: auth-docs
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/v3/api-docs/auth
              filters:
                - RewritePath=/v3/api-docs/auth, /v3/api-docs

            - id: user-docs
              uri: lb://USER-SERVICE
              predicates:
                - Path=/v3/api-docs/user
              filters:
                - RewritePath=/v3/api-docs/user, /v3/api-docs

            - id: startup-docs
              uri: lb://STARTUP-SERVICE
              predicates:
                - Path=/v3/api-docs/startup
              filters:
                - RewritePath=/v3/api-docs/startup, /v3/api-docs

            - id: investment-docs
              uri: lb://INVESTMENT-SERVICE
              predicates:
                - Path=/v3/api-docs/investment
              filters:
                - RewritePath=/v3/api-docs/investment, /v3/api-docs

            - id: team-docs
              uri: lb://TEAM-SERVICE
              predicates:
                - Path=/v3/api-docs/team
              filters:
                - RewritePath=/v3/api-docs/team, /v3/api-docs

            - id: message-docs
              uri: lb://MESSAGE-SERVICE
              predicates:
                - Path=/v3/api-docs/message
              filters:
                - RewritePath=/v3/api-docs/message, /v3/api-docs

            - id: notification-docs
              uri: lb://NOTIFICATION-SERVICE
              predicates:
                - Path=/v3/api-docs/notification
              filters:
                - RewritePath=/v3/api-docs/notification, /v3/api-docs


# ================= SWAGGER UI =================

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    urls:
      - name: Auth Service
        url: /v3/api-docs/auth
      - name: User Service
        url: /v3/api-docs/user
      - name: Startup Service
        url: /v3/api-docs/startup
      - name: Investment Service
        url: /v3/api-docs/investment
      - name: Team Service
        url: /v3/api-docs/team
      - name: Message Service
        url: /v3/api-docs/message
      - name: Notification Service
        url: /v3/api-docs/notification


# ================= EUREKA =================

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    hostname: localhost


# ================= RESILIENCE =================

resilience4j:
  circuitbreaker:
    instances:
      default:
        failure-rate-threshold: 50
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 10s
        sliding-window-size: 10


# ================= ACTUATOR =================

management:
  endpoints:
    web:
      exposure:
        include: "*"
  tracing:
    sampling:
      probability: 1.0


# ================= ZIPKIN (OPTIONAL) =================

