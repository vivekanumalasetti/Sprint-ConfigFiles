server:
  port: 8080

spring:
  application:
    name: api-gateway

  main:
    web-application-type: reactive

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/auth/**

            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/users/**

            - id: startup-service
              uri: lb://STARTUP-SERVICE
              predicates:
                - Path=/startups/**

            - id: investment-service
              uri: lb://INVESTMENT-SERVICE
              predicates:
                - Path=/investments/**

            # - id: team-service
            #   uri: lb://TEAM-SERVICE
            #   predicates:
            #     - Path=/teams/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    hostname: localhost

resilience4j:
  circuitbreaker:
    instances:
      productService:
        failure-rate-threshold: 50
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 10s
        sliding-window-size: 10

management:
  endpoints:
    web:
      exposure:
        include: "*"

  tracing:
    sampling:
      probability: 1.0

  # zipkin:
  #   tracing:
  #     endpoint: http://localhost:9411/api/v2/spans
