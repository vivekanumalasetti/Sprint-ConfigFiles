server:
  port: 8081

spring:
  application:
    name: api-gateway

  main:
    web-application-type: reactive

  cloud:
    gateway:
      server:
        webflux:
          routes:

            # ================= BUSINESS ROUTES =================

            - id: auth-service
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/auth/**
              filters:
                - RewritePath=/auth/(?<path>.*), /${path}

            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/users/**
              filters:
                - RewritePath=/users/(?<path>.*), /${path}

            - id: startup-service
              uri: lb://STARTUP-SERVICE
              predicates:
                - Path=/startups/**
              filters:
                - RewritePath=/startups/(?<path>.*), /${path}

            - id: investment-service
              uri: lb://INVESTMENT-SERVICE
              predicates:
                - Path=/investments/**
              filters:
                - RewritePath=/investments/(?<path>.*), /${path}

            - id: team-service
              uri: lb://TEAM-SERVICE
              predicates:
                - Path=/teams/**
              filters:
                - RewritePath=/teams/(?<path>.*), /${path}

            - id: message-service
              uri: lb://MESSAGE-SERVICE
              predicates:
                - Path=/messages/**
              filters:
                - RewritePath=/messages/(?<path>.*), /${path}

            - id: notification-service
              uri: lb://NOTIFICATION-SERVICE
              predicates:
                - Path=/notifications/**
              filters:
                - RewritePath=/notifications/(?<path>.*), /${path}


            # ================= SWAGGER ROUTES =================

            - id: auth-service-swagger
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/auth/v3/api-docs
              filters:
                - RewritePath=/auth/v3/api-docs, /v3/api-docs

            - id: user-service-swagger
              uri: lb://USER-SERVICE
              predicates:
                - Path=/users/v3/api-docs
              filters:
                - RewritePath=/users/v3/api-docs, /v3/api-docs

            - id: startup-service-swagger
              uri: lb://STARTUP-SERVICE
              predicates:
                - Path=/startups/v3/api-docs
              filters:
                - RewritePath=/startups/v3/api-docs, /v3/api-docs

            - id: investment-service-swagger
              uri: lb://INVESTMENT-SERVICE
              predicates:
                - Path=/investments/v3/api-docs
              filters:
                - RewritePath=/investments/v3/api-docs, /v3/api-docs

            - id: team-service-swagger
              uri: lb://TEAM-SERVICE
              predicates:
                - Path=/teams/v3/api-docs
              filters:
                - RewritePath=/teams/v3/api-docs, /v3/api-docs

            - id: message-service-swagger
              uri: lb://MESSAGE-SERVICE
              predicates:
                - Path=/messages/v3/api-docs
              filters:
                - RewritePath=/messages/v3/api-docs, /v3/api-docs

            - id: notification-service-swagger
              uri: lb://NOTIFICATION-SERVICE
              predicates:
                - Path=/notifications/v3/api-docs
              filters:
                - RewritePath=/notifications/v3/api-docs, /v3/api-docs


# ================= SWAGGER CONFIG =================

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    config-url: /v3/api-docs/swagger-config
    disable-swagger-default-url: true

    urls:
      - name: Auth Service
        url: /auth/v3/api-docs
      - name: User Service
        url: /users/v3/api-docs
      - name: Startup Service
        url: /startups/v3/api-docs
      - name: Investment Service
        url: /investments/v3/api-docs
      - name: Team Service
        url: /teams/v3/api-docs
      - name: Message Service
        url: /messages/v3/api-docs
      - name: Notification Service
        url: /notifications/v3/api-docs

  api-docs:
    enabled: false


# ================= EUREKA =================

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    hostname: localhost


# ================= RESILIENCE4J =================

resilience4j:
  circuitbreaker:
    instances:
      default:
        failure-rate-threshold: 50
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 10s
        sliding-window-size: 10


# ================= ACTUATOR =================

management:
  endpoints:
    web:
      exposure:
        include: "*"
  tracing:
    sampling:
      probability: 1.0
